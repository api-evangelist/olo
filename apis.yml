aid: olo
name: Olo
description: >-
  Olo is a leading on-demand commerce platform powering the digital experience for restaurant brands, serving
  approximately 750+ enterprise and emerging chains across 90,000+ restaurant locations. The Olo platform combines
  online ordering, delivery dispatch, marketplace integration (Rails), payments (Olo Pay), guest data (GDP / Marketing),
  loyalty, and POS connectivity (Omnivore) into a single restaurant commerce stack. Developers and certified Olo Connect
  partners build against the Ordering API (custom order injection), Rails API (third-party marketplace order delivery),
  Dispatch API (delivery orchestration), the POS Interface (OloCloud) for direct POS integrations, the Omnivore API
  (multi-POS abstraction), the Olo Pay SDKs (iOS, Android, Flutter, Digital Wallets), and a webhook surface that fires
  order, loyalty, gift-card, and tender events. APIs use signature-based request authorization (HMAC) for ordering/rails
  plus webhook signature validation; sample code is published for C#, Java, PHP, Ruby, JavaScript, and Python. Olo (NYSE
  - OLO) is headquartered in New York City and went public in March 2021.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
