apis:
  - aid: olo:olo-ordering
    name: Olo Ordering API
    description: >-
      The Olo Ordering API is the platform's flagship order-injection surface, enabling certified partner apps, branded
      restaurant clients, and white-label storefronts to push custom orders, baskets, and payment authorizations into
      Olo's network of 90,000+ restaurant locations. The API covers menu retrieval, basket construction, basket
      validation, fulfillment options (pickup, curbside, dine-in, delivery), gift cards, coupons, loyalty redemption,
      and order submission. Requests are signed with HMAC-based signature authorization; sandbox credentials are issued
      through the Olo Developer Portal after partner certification.
    humanURL: https://developer.olo.com/
    tags:
      - Ordering
      - Baskets
      - Menus
      - Restaurants
    properties:
      - type: DeveloperPortal
        url: https://developer.olo.com/
      - type: Authentication
        url: https://github.com/ololabs/dev-support-code-samples
      - type: CodeExamples
        url: https://github.com/ololabs/dev-support-code-samples
      - type: OpenAPI
        url: openapi/olo-ordering-openapi.yml
      - type: Example
        url: examples/olo-ordering-check-user-exists-example.json
      - type: Example
        url: examples/olo-ordering-create-basket-example.json
  - aid: olo:olo-rails
    name: Olo Rails API
    description: >-
      Olo Rails is the marketplace-delivery integration surface, accepting orders originated on third-party delivery
      marketplaces (DoorDash, Uber Eats, Grubhub, Google, and 25+ other channels) and injecting them into the
      restaurant's POS through Olo. Rails normalizes menu mapping, modifier translation, fulfillment timing, and
      tax/tender handling across marketplaces. Partners authenticate with Rails-specific signature authorization that
      differs from the Ordering API signature scheme.
    humanURL: https://www.olo.com/products/rails
    tags:
      - Rails
      - Marketplace
      - Delivery
      - Order Injection
    properties:
      - type: Documentation
        url: https://www.olo.com/products/rails
      - type: Authentication
        url: https://github.com/ololabs/dev-support-code-samples
      - type: CodeExamples
        url: https://github.com/ololabs/dev-support-code-samples
      - type: OpenAPI
        url: openapi/olo-ordering-openapi.yml
      - type: Example
        url: examples/olo-ordering-create-basket-example.json
  - aid: olo:olo-dispatch
    name: Olo Dispatch API
    description: >-
      The Olo Dispatch API orchestrates direct delivery for restaurants by routing orders to a network of delivery
      service providers (DSPs) such as DoorDash Drive, Uber Direct, Postmates, and Relay. Dispatch handles quote
      retrieval, driver assignment, status callbacks, fee calculation, and tipping. Restaurants use Dispatch to power
      their own branded delivery without operating a fleet.
    humanURL: https://www.olo.com/products/dispatch
    tags:
      - Dispatch
      - Delivery
      - Logistics
      - Last Mile
    properties:
      - type: Documentation
        url: https://www.olo.com/products/dispatch
      - type: StatusPage
        url: https://status.olo.com/
  - aid: olo:olo-pos-interface
    name: Olo POS Interface (OloCloud)
    description: >-
      The Olo POS Interface Specification (commonly OloCloud) is the contract POS vendors implement to make their
      point-of-sale system natively integrable with Olo's ordering platform. The interface defines menu synchronization,
      order injection, store hours, store status (eighty-sixing), and tender configuration that the POS must accept and
      respond to. Certified POS systems include NCR Aloha, PAR Brink, Oracle Micros Simphony, POSitouch, Squirrel, and
      others.
    humanURL: https://olosupport.zendesk.com/hc/en-us/articles/115002761943-Olo-POS-Interface-Specification-aka-OloCloud
    tags:
      - POS
      - Point of Sale
      - Integration
      - Menus
    properties:
      - type: Documentation
        url: https://olosupport.zendesk.com/hc/en-us/articles/115002761943-Olo-POS-Interface-Specification-aka-OloCloud
  - aid: olo:olo-omnivore
    name: Omnivore POS API
    description: >-
      Omnivore (acquired by Olo in 2019) is a universal POS API that abstracts 12+ point-of-sale systems behind a single
      REST surface, handling 5.6M API calls per day across 23,000+ restaurant locations. Endpoints cover tickets, menus,
      employees, tenders, modifiers, discounts, and location data. Supported POS systems include NCR Aloha, PAR Brink,
      Dinerware, Micros Simphony, Micros 3700, POSitouch, Squirrel, XPIENT, Maitre'D, NCR Cloud Connect, Simphony FE,
      and SimphonyCloud.
    humanURL: https://www.olo.com/omnivoreapi
    tags:
      - POS
      - Omnivore
      - Tickets
      - Multi-POS
    properties:
      - type: Documentation
        url: https://www.olo.com/omnivoreapi
      - type: Login
        url: https://panel.omnivore.io/login
  - aid: olo:olo-pay
    name: Olo Pay API
    description: >-
      Olo Pay is the platform's embedded payments solution, providing PCI-compliant card capture, tokenization, Apple
      Pay / Google Pay digital wallet acceptance, network tokenization, fraud prevention, and chargeback handling for
      restaurant brands. Developers integrate via native SDKs (iOS, Android, Flutter) and a Digital Wallets SDK that
      complements the Olo Ordering API checkout flow. Olo Pay is also offered as Borderless Payments for cross-border
      transactions.
    humanURL: https://www.olo.com/products/pay
    tags:
      - Payments
      - Pay
      - PCI
      - Digital Wallets
    properties:
      - type: Documentation
        url: https://www.olo.com/products/pay
      - type: SDK
        url: https://github.com/ololabs/olo-pay-ios-sdk-releases
      - type: SDK
        url: https://github.com/ololabs/olo-pay-android-sdk-releases
      - type: SDK
        url: https://github.com/ololabs/olo-pay-flutter-sdk-releases
      - type: SDK
        url: https://github.com/ololabs/pay-digitalwallets-ios-sdk-releases
      - type: SDK
        url: https://github.com/ololabs/pay-digitalwallets-android-sdk-releases
      - type: SDK
        url: https://github.com/ololabs/pay-digitalwallets-flutter-sdk-releases
  - aid: olo:olo-network
    name: Olo Network API
    description: >-
      The Olo Network is a second-party ordering ecosystem that exposes participating restaurant brands' menus and
      ordering surfaces to high-intent guest channels (super-apps, wallets, voice agents, AI assistants) while keeping
      the restaurant in control of the guest relationship. Network API access lets approved channel partners discover
      stores, fetch menus, build baskets, and submit orders that flow through the same Ordering / POS Interface
      pipeline.
    humanURL: https://www.olo.com/network
    tags:
      - Network
      - Second-Party
      - Distribution
      - Channels
    properties:
      - type: Documentation
        url: https://www.olo.com/network
  - aid: olo:olo-marketing
    name: Olo Marketing & Guest Data Platform API
    description: >-
      Olo Marketing and the Guest Data Platform (GDP) unify first-party guest data captured across ordering, payments,
      loyalty, host, and sentiment signals into a single guest profile that powers segmentation, lifecycle campaigns,
      and personalization. The Marketing surface exposes segments, campaigns, audiences, events, and webhooks used by
      ESPs, SMS providers (Attentive, Infobip), and loyalty engines to engage guests at scale.
    humanURL: https://www.olo.com/products/marketing
    tags:
      - Marketing
      - Guest Data Platform
      - GDP
      - Segmentation
      - Personalization
    properties:
      - type: Documentation
        url: https://www.olo.com/products/marketing
  - aid: olo:olo-loyalty
    name: Olo Loyalty API
    description: >-
      Olo Loyalty (formerly OloEngage) lets restaurant brands run rewards programs that are tightly bound to the
      Ordering and POS surfaces - accrual, redemption, tier evaluation, and single-sign-on flow through the Loyalty API
      and matching loyalty SSO endpoints exposed on the developer portal. Integrates with third-party loyalty engines
      (Punchh, Paytronix, Thanx) as well as Olo's native loyalty product.
    humanURL: https://www.olo.com/products/olo-loyalty
    tags:
      - Loyalty
      - Rewards
      - SSO
      - Engagement
    properties:
      - type: Documentation
        url: https://www.olo.com/products/olo-loyalty
      - type: OpenAPI
        url: openapi/olo-promotions-openapi.yml
      - type: SDK
        url: https://github.com/ololabs/promotions-sdk
      - type: Example
        url: examples/olo-promotions-validate-example.json
      - type: Example
        url: examples/olo-promotions-account-example.json
      - type: JSONSchema
        url: json-schema/olo-promotions-account-schema.json
      - type: JSONSchema
        url: json-schema/olo-promotions-request-schema.json
      - type: JSONStructure
        url: json-structure/olo-promotions-structure.json
  - aid: olo:olo-host
    name: Olo Host API
    description: >-
      Olo Host (acquired from Wisely) provides reservations, waitlist, table management, and host-stand workflows for
      restaurants. The Host API exposes reservation creation, waitlist updates, table state, and guest tagging,
      integrating with the Guest Data Platform so dine-in behavior enriches the same guest profile used in ordering and
      marketing.
    humanURL: https://www.olo.com/products/host
    tags:
      - Host
      - Reservations
      - Waitlist
      - Dine-In
    properties:
      - type: Documentation
        url: https://www.olo.com/products/host
  - aid: olo:olo-sentiment
    name: Olo Sentiment API
    description: >-
      Olo Sentiment aggregates guest feedback signals - post-order surveys, public reviews (Google, Yelp), and social
      mentions - and exposes them through a sentiment API used for reputation management dashboards and automated guest
      recovery workflows.
    humanURL: https://www.olo.com/products/sentiment
    tags:
      - Sentiment
      - Reviews
      - Reputation
      - Feedback
    properties:
      - type: Documentation
        url: https://www.olo.com/products/sentiment
  - aid: olo:olo-webhooks
    name: Olo Webhooks
    description: >-
      Olo exposes outbound webhooks that fire on order lifecycle events (placed, confirmed, ready, completed, refunded),
      gift-card activity, loyalty accrual / redemption, tender events, and marketplace status changes. Webhooks are
      HMAC-signed; reference signature-validation samples are published in C#, Java, PHP, Ruby, JavaScript, and Python
      in the ololabs/dev-support-code-samples repository.
    humanURL: https://github.com/ololabs/dev-support-code-samples
    tags:
      - Webhooks
      - Events
      - Notifications
    properties:
      - type: Documentation
        url: https://github.com/ololabs/dev-support-code-samples
      - type: CodeExamples
        url: https://github.com/ololabs/dev-support-code-samples
      - type: AsyncAPI
        url: asyncapi/olo-webhooks-asyncapi.yml
