naftiko: "1.0.0-alpha2"

info:
  label: "Olo Promotions API — Promotions"
  description: >-
    Promotions — validation and redemption of coupons and loyalty rewards. 3 operations.
    Lead operation: Validate Promotions. Self-contained Naftiko capability covering one Olo business surface.
  tags:
    - Olo
    - Promotions
    - Redemption
  created: "2026-06-03"
  modified: "2026-06-03"

binds:
  - namespace: env
    keys:
      OLO_PROMOTIONS_SECRET: OLO_PROMOTIONS_SECRET

capability:

  consumes:
    - type: http
      namespace: "promotions-promotions"
      baseUri: "https://promotions.example.com"
      description: "Olo Promotions API — Promotions business capability. Self-contained, no shared references."
      authentication:
        type: apikey
        key: Authorization
        value: "{{env.OLO_PROMOTIONS_SECRET}}"
        placement: header
      resources:
        - name: "promotions-validate"
          path: "/promotions/validate"
          operations:
            - name: "validatePromotions"
              method: POST
              description: "Validate the coupons and loyalty rewards applied to a basket."
              inputParameters:
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "The PromotionsRequest payload describing the order and basket."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "promotions-redemptions"
          path: "/promotions/redemptions"
          operations:
            - name: "redeemPromotions"
              method: POST
              description: "Redeem the coupons and loyalty rewards applied to a placed order."
              inputParameters:
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "The PromotionsRequest payload describing the order and basket."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "promotions-redemption"
          path: "/promotions/redemptions/{redemptionId}"
          operations:
            - name: "voidRedemption"
              method: DELETE
              description: "Void a previously redeemed set of coupons and rewards for an order."
              inputParameters:
                - name: "redemptionId"
                  in: path
                  type: string
                  required: true
                  description: "The identifier of the redemption being voided."
                - name: "body"
                  in: body
                  type: object
                  required: false
                  description: "The VoidRedemptionRequest payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "promotions-promotions-rest"
      port: 8080
      description: "REST adapter for Olo Promotions API — Promotions. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/promotions/validations"
          name: "promotions-validations"
          description: "REST surface for promotion validation."
          operations:
            - method: POST
              name: "validatePromotions"
              description: "Validate the coupons and loyalty rewards applied to a basket."
              call: "promotions-promotions.validatePromotions"
              with:
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/promotions/redemptions"
          name: "promotions-redemptions"
          description: "REST surface for promotion redemption."
          operations:
            - method: POST
              name: "redeemPromotions"
              description: "Redeem the coupons and loyalty rewards applied to a placed order."
              call: "promotions-promotions.redeemPromotions"
              with:
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/promotions/redemptions/{redemption-id}"
          name: "promotions-redemption"
          description: "REST surface for voiding a redemption."
          operations:
            - method: DELETE
              name: "voidRedemption"
              description: "Void a previously redeemed set of coupons and rewards for an order."
              call: "promotions-promotions.voidRedemption"
              with:
                redemptionId: "rest.redemptionId"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "promotions-promotions-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Olo Promotions API — Promotions. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "validate-promotions"
          description: "Validate the coupons and loyalty rewards applied to a basket."
          hints:
            readOnly: true
            destructive: false
            idempotent: false
          call: "promotions-promotions.validatePromotions"
          with:
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "redeem-promotions"
          description: "Redeem the coupons and loyalty rewards applied to a placed order."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "promotions-promotions.redeemPromotions"
          with:
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "void-redemption"
          description: "Void a previously redeemed set of coupons and rewards for an order."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "promotions-promotions.voidRedemption"
          with:
            redemptionId: "tools.redemptionId"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
