naftiko: "1.0.0-alpha2"

info:
  label: "Olo Ordering API — Rails"
  description: >-
    Rails — marketplace Rails partner export and order injection operations. 2 operations.
    Lead operation: Get Vendor Export Status. Self-contained Naftiko capability covering one Olo business surface.
  tags:
    - Olo
    - Ordering
    - Rails
  created: "2026-06-03"
  modified: "2026-06-03"

binds:
  - namespace: env
    keys:
      OLO_ORDERING_SIGNATURE: OLO_ORDERING_SIGNATURE

capability:

  consumes:
    - type: http
      namespace: "ordering-rails"
      baseUri: "https://ordering.api.olosandbox.com"
      description: "Olo Ordering API — Rails business capability. Self-contained, no shared references."
      authentication:
        type: apikey
        key: Authorization
        value: "{{env.OLO_ORDERING_SIGNATURE}}"
        placement: header
      resources:
        - name: "vendorexport-status"
          path: "/v1.1/vendorexport/status"
          operations:
            - name: "getVendorExportStatus"
              method: GET
              description: "Retrieve the status of the Rails vendor (restaurant) export for the authenticated marketplace partner."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "baskets-create"
          path: "/v1.1/baskets/create"
          operations:
            - name: "createBasket"
              method: POST
              description: "Create a new basket for a vendor (restaurant) location to begin assembling an order for injection."
              inputParameters:
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "An object containing the vendor identifier the basket is created for."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "ordering-rails-rest"
      port: 8080
      description: "REST adapter for Olo Ordering API — Rails. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/vendor-exports/status"
          name: "vendor-exports-status"
          description: "REST surface for Rails vendor export status."
          operations:
            - method: GET
              name: "getVendorExportStatus"
              description: "Retrieve the status of the Rails vendor (restaurant) export for the authenticated marketplace partner."
              call: "ordering-rails.getVendorExportStatus"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/baskets"
          name: "baskets"
          description: "REST surface for Rails basket creation."
          operations:
            - method: POST
              name: "createBasket"
              description: "Create a new basket for a vendor (restaurant) location to begin assembling an order for injection."
              call: "ordering-rails.createBasket"
              with:
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "ordering-rails-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Olo Ordering API — Rails. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "get-vendor-export-status"
          description: "Retrieve the status of the Rails vendor (restaurant) export for the authenticated marketplace partner."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "ordering-rails.getVendorExportStatus"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "create-basket"
          description: "Create a new basket for a vendor (restaurant) location to begin assembling an order for injection."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "ordering-rails.createBasket"
          with:
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
