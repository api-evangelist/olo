naftiko: "1.0.0-alpha2"

info:
  label: "Olo Ordering API — Brand"
  description: >-
    Brand — brand-level configuration and metadata. 1 operation. Lead operation: Get Brand.
    Self-contained Naftiko capability covering one Olo business surface.
  tags:
    - Olo
    - Ordering
    - Brand
  created: "2026-06-03"
  modified: "2026-06-03"

binds:
  - namespace: env
    keys:
      OLO_ORDERING_SIGNATURE: OLO_ORDERING_SIGNATURE

capability:

  consumes:
    - type: http
      namespace: "ordering-brand"
      baseUri: "https://ordering.api.olosandbox.com"
      description: "Olo Ordering API — Brand business capability. Self-contained, no shared references."
      authentication:
        type: apikey
        key: Authorization
        value: "{{env.OLO_ORDERING_SIGNATURE}}"
        placement: header
      resources:
        - name: "brand"
          path: "/v1.1/brand"
          operations:
            - name: "getBrand"
              method: GET
              description: "Retrieve configuration and metadata for the brand associated with the authenticated partner credentials."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "ordering-brand-rest"
      port: 8080
      description: "REST adapter for Olo Ordering API — Brand. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/brand"
          name: "brand"
          description: "REST surface for brand configuration."
          operations:
            - method: GET
              name: "getBrand"
              description: "Retrieve configuration and metadata for the brand associated with the authenticated partner credentials."
              call: "ordering-brand.getBrand"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "ordering-brand-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Olo Ordering API — Brand. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "get-brand"
          description: "Retrieve configuration and metadata for the brand associated with the authenticated partner credentials."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "ordering-brand.getBrand"
          outputParameters:
            - type: object
              mapping: "$."
