naftiko: "1.0.0-alpha2"

info:
  label: "Olo Ordering API — Users"
  description: >-
    Users — guest account lookups. 1 operation. Lead operation: Check User Exists.
    Self-contained Naftiko capability covering one Olo business surface.
  tags:
    - Olo
    - Ordering
    - Users
  created: "2026-06-03"
  modified: "2026-06-03"

binds:
  - namespace: env
    keys:
      OLO_ORDERING_SIGNATURE: OLO_ORDERING_SIGNATURE

capability:

  consumes:
    - type: http
      namespace: "ordering-users"
      baseUri: "https://ordering.api.olosandbox.com"
      description: "Olo Ordering API — Users business capability. Self-contained, no shared references."
      authentication:
        type: apikey
        key: Authorization
        value: "{{env.OLO_ORDERING_SIGNATURE}}"
        placement: header
      resources:
        - name: "users-exists"
          path: "/v1.1/users/exists"
          operations:
            - name: "checkUserExists"
              method: POST
              description: "Check whether a guest account already exists for a given email address."
              inputParameters:
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "An object containing the email address to check."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "ordering-users-rest"
      port: 8080
      description: "REST adapter for Olo Ordering API — Users. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/users/existence-checks"
          name: "users-existence-checks"
          description: "REST surface for guest account existence checks."
          operations:
            - method: POST
              name: "checkUserExists"
              description: "Check whether a guest account already exists for a given email address."
              call: "ordering-users.checkUserExists"
              with:
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "ordering-users-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Olo Ordering API — Users. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "check-user-exists"
          description: "Check whether a guest account already exists for a given email address."
          hints:
            readOnly: true
            destructive: false
            idempotent: false
          call: "ordering-users.checkUserExists"
          with:
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
