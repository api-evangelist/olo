naftiko: "1.0.0-alpha2"

info:
  label: "Olo Promotions API — Accounts"
  description: >-
    Accounts — loyalty account creation and lookup. 3 operations. Lead operation: Create Account.
    Self-contained Naftiko capability covering one Olo business surface.
  tags:
    - Olo
    - Promotions
    - Accounts
  created: "2026-06-03"
  modified: "2026-06-03"

binds:
  - namespace: env
    keys:
      OLO_PROMOTIONS_SECRET: OLO_PROMOTIONS_SECRET

capability:

  consumes:
    - type: http
      namespace: "promotions-accounts"
      baseUri: "https://promotions.example.com"
      description: "Olo Promotions API — Accounts business capability. Self-contained, no shared references."
      authentication:
        type: apikey
        key: Authorization
        value: "{{env.OLO_PROMOTIONS_SECRET}}"
        placement: header
      resources:
        - name: "promotions-accounts"
          path: "/promotions/accounts"
          operations:
            - name: "createAccount"
              method: POST
              description: "Create a new loyalty account in the provider's system for a guest."
              inputParameters:
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "The CreateAccountRequest payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: "findAccounts"
              method: GET
              description: "Find loyalty accounts matching a membership number."
              inputParameters:
                - name: "membershipNumber"
                  in: query
                  type: string
                  required: true
                  description: "The membership number used to locate the guest's loyalty account(s)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "promotions-account"
          path: "/promotions/accounts/{accountId}"
          operations:
            - name: "getAccount"
              method: GET
              description: "Retrieve a single loyalty account by its identifier."
              inputParameters:
                - name: "accountId"
                  in: path
                  type: string
                  required: true
                  description: "The loyalty account's unique identifier in the provider's system."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "promotions-accounts-rest"
      port: 8080
      description: "REST adapter for Olo Promotions API — Accounts. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/promotions/accounts"
          name: "promotions-accounts"
          description: "REST surface for loyalty accounts."
          operations:
            - method: POST
              name: "createAccount"
              description: "Create a new loyalty account in the provider's system for a guest."
              call: "promotions-accounts.createAccount"
              with:
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: "findAccounts"
              description: "Find loyalty accounts matching a membership number."
              call: "promotions-accounts.findAccounts"
              with:
                membershipNumber: "rest.membershipNumber"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/promotions/accounts/{account-id}"
          name: "promotions-account"
          description: "REST surface for a single loyalty account."
          operations:
            - method: GET
              name: "getAccount"
              description: "Retrieve a single loyalty account by its identifier."
              call: "promotions-accounts.getAccount"
              with:
                accountId: "rest.accountId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "promotions-accounts-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Olo Promotions API — Accounts. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "create-account"
          description: "Create a new loyalty account in the provider's system for a guest."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "promotions-accounts.createAccount"
          with:
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "find-accounts"
          description: "Find loyalty accounts matching a membership number."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "promotions-accounts.findAccounts"
          with:
            membershipNumber: "tools.membershipNumber"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-account"
          description: "Retrieve a single loyalty account by its identifier."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "promotions-accounts.getAccount"
          with:
            accountId: "tools.accountId"
          outputParameters:
            - type: object
              mapping: "$."
