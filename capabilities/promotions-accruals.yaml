naftiko: "1.0.0-alpha2"

info:
  label: "Olo Promotions API — Accruals"
  description: >-
    Accruals — loyalty point accrual and void. 2 operations. Lead operation: Accrue Points.
    Self-contained Naftiko capability covering one Olo business surface.
  tags:
    - Olo
    - Promotions
    - Loyalty
  created: "2026-06-03"
  modified: "2026-06-03"

binds:
  - namespace: env
    keys:
      OLO_PROMOTIONS_SECRET: OLO_PROMOTIONS_SECRET

capability:

  consumes:
    - type: http
      namespace: "promotions-accruals"
      baseUri: "https://promotions.example.com"
      description: "Olo Promotions API — Accruals business capability. Self-contained, no shared references."
      authentication:
        type: apikey
        key: Authorization
        value: "{{env.OLO_PROMOTIONS_SECRET}}"
        placement: header
      resources:
        - name: "promotions-accruals"
          path: "/promotions/accruals"
          operations:
            - name: "accruePoints"
              method: POST
              description: "Accrue loyalty points for a placed order against a guest's loyalty account."
              inputParameters:
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "The AccruePointsRequest payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "promotions-accrual"
          path: "/promotions/accruals/{accrualId}"
          operations:
            - name: "voidAccrual"
              method: DELETE
              description: "Void a previously recorded loyalty point accrual for an order."
              inputParameters:
                - name: "accrualId"
                  in: path
                  type: string
                  required: true
                  description: "The identifier of the accrual being voided."
                - name: "body"
                  in: body
                  type: object
                  required: false
                  description: "The VoidAccrualRequest payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "promotions-accruals-rest"
      port: 8080
      description: "REST adapter for Olo Promotions API — Accruals. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/promotions/accruals"
          name: "promotions-accruals"
          description: "REST surface for loyalty point accrual."
          operations:
            - method: POST
              name: "accruePoints"
              description: "Accrue loyalty points for a placed order against a guest's loyalty account."
              call: "promotions-accruals.accruePoints"
              with:
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/promotions/accruals/{accrual-id}"
          name: "promotions-accrual"
          description: "REST surface for voiding an accrual."
          operations:
            - method: DELETE
              name: "voidAccrual"
              description: "Void a previously recorded loyalty point accrual for an order."
              call: "promotions-accruals.voidAccrual"
              with:
                accrualId: "rest.accrualId"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "promotions-accruals-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Olo Promotions API — Accruals. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "accrue-points"
          description: "Accrue loyalty points for a placed order against a guest's loyalty account."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "promotions-accruals.accruePoints"
          with:
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "void-accrual"
          description: "Void a previously recorded loyalty point accrual for an order."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "promotions-accruals.voidAccrual"
          with:
            accrualId: "tools.accrualId"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
